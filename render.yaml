# Render.com blueprint — aligned with HiGo's actual stack (Railway is primary).
# Use this only if deploying to Render instead of Railway.

databases:
  - name: higo-postgres
    databaseName: higo
    user: higo
    plan: free
    postgresMajorVersion: 16

  - name: higo-redis
    plan: free
    ipAllowList: []

services:
  - type: web
    name: higo-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    startCommand: node apps/api/dist/main.js
    preDeployCommand: cd apps/api && pnpm exec prisma migrate deploy
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: higo-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: higo-redis
          type: redis
          property: connectionString

      - key: APP_BASE_URL
        sync: false
      - key: APP_PAYMENT_CALLBACK_URL
        sync: false
      - key: EXPO_PUBLIC_API_BASE_URL
        sync: false
      - key: EXPO_PUBLIC_SOCKET_URL
        sync: false

      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false

      - key: OTP_PROVIDER
        value: firebase
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: PUSH_ENABLED
        value: true
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        sync: false
      - key: AFRICASTALKING_USERNAME
        sync: false
      - key: AFRICASTALKING_API_KEY
        sync: false
      - key: AFRICASTALKING_SENDER_ID
        sync: false

      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      - key: CLOUDFLARE_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_SECRET_ACCESS_KEY
        sync: false

      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: WEEKLY_KPI_EMAIL_RECIPIENTS
        sync: false
      - key: WEEKLY_MARKETING_SPEND_KOBO
        sync: false
      - key: WEEKLY_OPERATING_COSTS_KOBO
        sync: false
      - key: CRON_JOBS_ENABLED
        value: true

      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: EXPO_PUBLIC_PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_PLAN_DAILY
        sync: false
      - key: PAYSTACK_PLAN_WEEKLY
        sync: false
      - key: PAYSTACK_PLAN_MONTHLY
        sync: false
      - key: PLATFORM_COMMISSION_RATE
        value: "0.10"

      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: EXPO_PUBLIC_GOOGLE_MAPS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false

      - key: SENTRY_DSN
        sync: false
      - key: DATADOG_API_KEY
        sync: false

  - type: worker
    name: higo-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: node apps/api/dist/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: higo-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: higo-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        fromService:
          name: higo-api
          type: web
          envVarKey: JWT_ACCESS_SECRET
      - key: JWT_REFRESH_SECRET
        fromService:
          name: higo-api
          type: web
          envVarKey: JWT_REFRESH_SECRET
      - key: ENCRYPTION_KEY
        fromService:
          name: higo-api
          type: web
          envVarKey: ENCRYPTION_KEY