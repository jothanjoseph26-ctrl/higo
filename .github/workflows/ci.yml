name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: corepack pnpm install --frozen-lockfile

      - run: corepack pnpm nx format:check --base="origin/main"
      - run: corepack pnpm nx run-many -t lint test build typecheck e2e-ci
      - run: corepack pnpm nx fix-ci
        if: always()
