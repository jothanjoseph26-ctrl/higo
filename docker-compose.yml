services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: higo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: higo
      POSTGRES_PASSWORD: higo_dev_password
      POSTGRES_DB: higo
    ports:
      - "5433:5432"
    volumes:
      - higo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U higo -d higo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: higo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - higo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: higo-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@higo.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  higo_pgdata:
  higo_redisdata:
