[build]
builder = "DOCKERFILE"
# Per-service Dockerfile via RAILWAY_DOCKERFILE_PATH (Dockerfile | Dockerfile.admin)

[deploy]
# Start command is in Dockerfile CMD (branches on PROCESS_ROLE=worker).
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.environmentVariables]
NODE_ENV = "production"
PORT = "3000"
# Also set in Railway dashboard: RESEND_API_KEY, WEEKLY_KPI_EMAIL_RECIPIENTS,
# CLOUDFLARE_*, FIREBASE_SERVICE_ACCOUNT_JSON, OTP_PROVIDER=firebase, CRON_JOBS_ENABLED=true
