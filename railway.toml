[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Web API service (default). For Bull dispatch jobs, deploy a second Railway
# service from the same repo with: node apps/api/dist/worker.js
startCommand = "node apps/api/dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.environmentVariables]
NODE_ENV = "production"
PORT = "3000"
# Also set in Railway dashboard: RESEND_API_KEY, WEEKLY_KPI_EMAIL_RECIPIENTS,
# CLOUDFLARE_*, FIREBASE_SERVICE_ACCOUNT_JSON, OTP_PROVIDER=firebase, CRON_JOBS_ENABLED=true
